<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>World War 3 - Selecție Rol</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .selection-container { text-align: center; background: rgba(20, 20, 20, 0.9); padding: 40px; border: 2px solid #333; border-radius: 15px; box-shadow: 0 0 30px rgba(0, 255, 136, 0.1); }
        .title { font-size: 2.5rem; letter-spacing: 5px; margin-bottom: 30px; color: #00ff88; text-shadow: 0 0 10px #00ff88; }
        .roles { display: flex; gap: 30px; justify-content: center; margin-bottom: 30px; }
        .role-card { width: 250px; padding: 20px; border: 1px solid #444; border-radius: 10px; cursor: pointer; transition: 0.3s; background: #1a1a1a; }
        .role-card:hover { transform: translateY(-10px); border-color: #00ff88; box-shadow: 0 10px 20px rgba(0,255,136,0.2); }
        .role-card.active { border: 2px solid #00ff88; background: #112211; }
        .role-img { height: 150px; background-size: cover; border-radius: 5px; margin-bottom: 15px; background-color: #333; }
        /* Placeholder pentru imagini */
        .soldier-bg { background-image: url('assets/elite_soldier.jpg'); } 
        .spy-bg { background-image: url('assets/spy_unit.jpg'); }
        .stats-list { list-style: none; padding: 0; text-align: left; font-size: 0.9rem; }
        .bar { width: 100%; height: 8px; background: #333; border-radius: 4px; margin-top: 5px; }
        .fill { height: 100%; border-radius: 4px; background: #00ff88; }
        #deploy-btn { padding: 15px 40px; font-size: 1.2rem; font-weight: bold; cursor: pointer; background: #333; color: #666; border: none; border-radius: 5px; transition: 0.3s; }
        #deploy-btn:not(:disabled) { background: #00ff88; color: black; box-shadow: 0 0 15px #00ff88; cursor: pointer; }
    </style>
</head>
<body>

<div class="selection-container">
    <h1 class="title">ALEGE-ȚI ENTITATEA</h1>
    
    <div class="roles">
        <div class="role-card soldier" onclick="selectRole('soldier')">
            <div class="role-img soldier-bg"></div>
            <h2>SOLDAT ELITĂ</h2>
            <p>PUTERE BRUTĂ | REZISTENȚĂ</p>
            <ul class="stats-list">
                <li>HP: 100 <div class="bar"><div class="fill" style="width:100%"></div></div></li>
                <li>VITEZĂ: 0.8x <div class="bar"><div class="fill" style="width:50%"></div></div></li>
            </ul>
        </div>

        <div class="role-card spy" onclick="selectRole('spy')">
            <div class="role-img spy-bg"></div>
            <h2>SPION (PION)</h2>
            <p>SABOTAJ | AGILITATE</p>
            <ul class="stats-list">
                <li>HP: 80 <div class="bar"><div class="fill" style="width:60%; background: #ff4444;"></div></div></li>
                <li>VITEZĂ: 1.25x <div class="bar"><div class="fill" style="width:100%; background: #00ff88;"></div></div></li>
            </ul>
        </div>
    </div>

    <button id="deploy-btn" disabled onclick="startMission()">INIȚIALIZARE MISIUNE</button>
</div>

<script>
function selectRole(role) {
    // Salvăm rolul ales local
    localStorage.setItem('chosen_role', role);
    
    // Activăm butonul
    const btn = document.getElementById('deploy-btn');
    btn.disabled = false;
    btn.innerText = "START MISIUNE: " + role.toUpperCase();
    
    // Efect vizual de selecție
    document.querySelectorAll('.role-card').forEach(card => card.classList.remove('active'));
    document.querySelector('.' + role).classList.add('active');
}

function startMission() {
    const role = localStorage.getItem('chosen_role');
    alert("Te-ai mobilizat ca: " + role.toUpperCase());
    window.location.href = "hangar.html"; // Te trimite la hangar după selecție
}
</script>

</body>
</html>
