<div class="info-box">
    <div>NUME: <span id="display-name">---</span></div>
    <div>RANG: <span id="display-rank" style="font-weight: bold;">---</span></div>
    <div>STATUS: <span id="status-display" class="status-label">ACTIV</span></div>
    <div style="margin-top: 5px; opacity: 0.6; font-size: 9px;">COD: <span id="id-code">IW3-AUTH-001</span></div>
</div>

<div id="army-stats">
    <strong>RESURSE UNITATE:</strong>
    <table id="stats-table">
        <thead>
            <tr><th>TIP</th><th>CANTITATE</th></tr>
        </thead>
        <tbody>
            <tr><td>Recruți</td><td>10</td></tr>
            <tr><td>Soldați</td><td>0</td></tr>
            <tr><td>Buget</td><td id="display-budget">5.000$</td></tr>
        </tbody>
    </table>
</div>

<script>
    window.onload = function() {
        // 1. Preluăm datele de pe serverul local
        const numeSalvat = localStorage.getItem('nume_comandant') || "RECRUT";
        const gradActual = (localStorage.getItem('rang_jucator') || "RECRUT").toUpperCase(); 
        const statusCont = localStorage.getItem('status_cont') || "ACTIV"; // Luăm statusul de securitate

        const root = document.documentElement;
        const displayRank = document.getElementById('display-rank');
        const displayStatus = document.getElementById('status-display');
        const displayName = document.getElementById('display-name');
        const displayBudget = document.getElementById('display-budget');
        const cardTitle = document.getElementById('card-title');

        // 2. LOGICA DE SECURITATE (ANTI-CRONUS)
        if (statusCont === "SUSPENDAT" || statusCont === "SUSPENDAT_CRONUS") {
            // Dacă e banat, totul devine ROȘU de avertizare
            root.style.setProperty('--theme-color', '#ff0000');
            root.style.setProperty('--bg-glow', 'rgba(255, 0, 0, 0.8)');
            
            if(cardTitle) cardTitle.innerText = "ACCES REFUZAT - INTEGRITATE COMPROMISĂ";
            displayStatus.innerText = "BLOCAT (CRONUS)";
            displayStatus.style.color = "#ff0000";
            displayStatus.style.textShadow = "0 0 10px #ff0000";
            
            // Înghețăm resursele
            displayBudget.innerText = "0$ (CONFISCAT)";
            console.error("ALERTA: Utilizator banat detectat în sistem.");
            
            // Opțional: Îl dăm afară după 5 secunde de "rușine"
            setTimeout(() => { alert("CONT SUSPENDAT PERMANENT."); window.location.href = 'index.html'; }, 5000);
            
        } else {
            // 3. LOGICA NORMALĂ: Ierarhie Verde/Roșie
            const gradeRosii = ["GENERAL", "AMIRAL"]; 
            
            if (gradeRosii.includes(gradActual)) {
                root.style.setProperty('--theme-color', '#ff0000');
                root.style.setProperty('--bg-glow', 'rgba(255, 0, 0, 0.4)');
                if(cardTitle) cardTitle.innerText = "ACCES NIVEL SUPREM - ENTITATEA ROȘIE";
            } else {
                root.style.setProperty('--theme-color', '#0f0');
                root.style.setProperty('--bg-glow', 'rgba(0, 255, 0, 0.2)');
                if(cardTitle) cardTitle.innerText = "ACCES NIVEL OPERATIV - ENTITATEA VERDE";
            }
            
            displayStatus.innerText = "OPERAȚIONAL";
            displayStatus.style.color = "var(--theme-color)";
        }

        // 4. Aplicare date finale pe ecran
        displayName.innerText = numeSalvat.toUpperCase();
        displayRank.innerText = gradActual;
        
        // Verificăm dacă elementul de Welcome există înainte de a scrie în el
        const welcomeTxt = document.getElementById('welcome-user');
        if(welcomeTxt) welcomeTxt.innerText = "BINE AI VENIT, " + gradActual + " " + numeSalvat.toUpperCase() + "!";
        
        const avatarBox = document.getElementById('avatar-img');
        if(avatarBox) avatarBox.innerHTML = gradActual + "<br>UNIT";

        console.log("Sistem WW3 stabilit pentru: " + numeSalvat + " [" + gradActual + "]");
    };
</script>
